server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-Routing: Alle Routen an index.html weiterleiten,
    # damit React Router die Navigation uebernehmen kann
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets lange cachen (Vite generiert gehashte Dateinamen)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Kein Caching fuer index.html selbst
    # (damit neue Deployments sofort sichtbar sind)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
